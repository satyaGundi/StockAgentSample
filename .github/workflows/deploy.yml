name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: THE SAFETY CHECK
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system .
      - name: Run Pytest
        env:
          # This dummy key allows the code to initialize without crashing
          GOOGLE_API_KEY: "dummy_key_for_testing"
        run: pytest

